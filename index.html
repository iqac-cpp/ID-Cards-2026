<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="refresh" content="1; url=https://script.google.com/macros/s/AKfycbzv-uBDOqOjw5osZLQqwS19I_PtegQ1vjl8n9b5uBqXslzSAv8q_K7EES1Jnh_zYUAe6g/exec">
  <title>Student ID Card Form - GDC Cheepurupalli</title>

  <style>
    :root {
      --blue: #174a78;
      --bg: #eaf3fb;
      --text: #1f2937;
      --muted: #667085;
      --border: #d8e3ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: min(680px, 100%);
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 18px;
      box-shadow: 0 10px 28px rgba(16, 24, 40, .10);
      text-align: center;
    }

    .loader {
      width: 42px;
      height: 42px;
      border: 5px solid #d8e3ef;
      border-top-color: var(--blue);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.2rem, 4.5vw, 1.6rem);
      color: var(--blue);
    }

    p {
      margin: 0 0 14px;
      line-height: 1.5;
      color: var(--muted);
      font-weight: 700;
    }

    .btn {
      display: inline-block;
      margin-top: 6px;
      background: var(--blue);
      color: white;
      text-decoration: none;
      font-weight: 900;
      padding: 13px 18px;
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(23, 74, 120, .2);
    }

    .note {
      margin-top: 14px;
      font-size: .9rem;
      color: var(--muted);
    }
  </style>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzv-uBDOqOjw5osZLQqwS19I_PtegQ1vjl8n9b5uBqXslzSAv8q_K7EES1Jnh_zYUAe6g/exec";

    window.addEventListener("load", function () {
      setTimeout(function () {
        window.location.replace(WEB_APP_URL);
      }, 500);
    });
  </script>
</head>

<body>
  <main class="card">
    <div class="loader"></div>
    <h1>Opening Student ID Card Form</h1>
    <p>Please wait. The official form will open automatically.</p>

    <a class="btn" href="https://script.google.com/macros/s/AKfycbzv-uBDOqOjw5osZLQqwS19I_PtegQ1vjl8n9b5uBqXslzSAv8q_K7EES1Jnh_zYUAe6g/exec" rel="noopener">
      Open Form Directly
    </a>

    <div class="note">
      On mobile, use Chrome and keep the page open until the success message appears.
    </div>
  </main>
</body>
</html>
