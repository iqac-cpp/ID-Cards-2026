<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Student ID Card Form - GDC Cheepurupalli</title>

  <style>
    :root {
      --blue: #174a78;
      --blue2: #236ba4;
      --bg: #eaf3fb;
      --text: #1f2937;
      --muted: #667085;
      --border: #d8e3ef;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 12px;
    }

    .hero {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white;
      border-radius: 18px;
      padding: 18px 14px;
      text-align: center;
      margin: 10px 0 12px;
      box-shadow: 0 8px 22px rgba(23, 74, 120, .18);
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,.18);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 5vw, 2rem);
      line-height: 1.15;
    }

    .hero p {
      margin: 8px 0 0;
      font-weight: 700;
      opacity: .96;
    }

    .notice {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      margin: 10px 0 12px;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.45;
      box-shadow: 0 4px 14px rgba(16, 24, 40, .05);
    }

    .frame-wrap {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(16, 24, 40, .08);
      min-height: 78vh;
    }

    iframe {
      display: block;
      width: 100%;
      height: 82vh;
      border: 0;
      background: white;
    }

    .open-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--blue);
      font-weight: 800;
      text-decoration: none;
    }

    .open-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .page {
        padding: 8px;
      }

      .hero {
        border-radius: 14px;
        padding: 14px 10px;
      }

      .notice {
        font-size: .9rem;
      }

      .frame-wrap {
        border-radius: 12px;
        min-height: 84vh;
      }

      iframe {
        height: 86vh;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="badge">GDC Cheepurupalli</div>
      <h1>Student ID Card Form</h1>
      <p>Submit correct details, photo and signature for ID card generation.</p>
    </section>

    <section class="notice">
      Please keep this page open until the success message appears. On mobile, use Chrome for best results.
      <br>
      <a class="open-link" href="https://script.google.com/macros/s/AKfycbzv-uBDOqOjw5osZLQqwS19I_PtegQ1vjl8n9b5uBqXslzSAv8q_K7EES1Jnh_zYUAe6g/exec" target="_blank" rel="noopener">
        Open form directly
      </a>
    </section>

    <section class="frame-wrap">
      <iframe
        src="https://script.google.com/macros/s/AKfycbzv-uBDOqOjw5osZLQqwS19I_PtegQ1vjl8n9b5uBqXslzSAv8q_K7EES1Jnh_zYUAe6g/exec"
        title="Student ID Card Form"
        loading="eager"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </section>
  </main>
</body>
</html>
